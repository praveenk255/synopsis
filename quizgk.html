<!DOCTYPE html>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap');
        body { font-family: 'Poppins', sans-serif; background-color: #0f172a; color: #f1f5f9; scroll-behavior: smooth; }
        
        /* 5-Pill Header with Glassmorphism */
        .top-stats-container { position: fixed; top: 10px; left: 0; width: 100%; display: flex; justify-content: space-evenly; align-items: center; padding: 0 4px; z-index: 50; pointer-events: none; }
        .glass-pill { 
            background: rgba(255, 255, 255, 0.08) !important; 
            backdrop-filter: blur(16px) saturate(180%); 
            -webkit-backdrop-filter: blur(16px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.1); 
            border-radius: 12px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            width: 18%; 
            height: 44px; 
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3); 
            pointer-events: auto; 
        }
        .stat-label { font-size: 0.42rem; font-weight: 800; text-transform: uppercase; opacity: 0.7; line-height: 1; margin-bottom: 2px; color: #fff; }
        .stat-val { font-size: 0.72rem; font-weight: 900; line-height: 1; }
        
        .nav-card { width: 150px; height: 150px; background-color: #1e293b; border: 1px solid rgba(255, 255, 255, 0.05); display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; border-radius: 1.5rem; padding: 0.8rem; transition: transform 0.1s ease; cursor: pointer; }
        .nav-card:active { transform: scale(0.96); }

        .metric-card { background-color: #1e293b; padding: 1.25rem 0.5rem; border-radius: 1rem; border: 1px solid rgba(255, 255, 255, 0.05); display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; gap: 0.25rem; }

        .option-btn.correct { background-color: #22c55e !important; color: white !important; }
        .option-btn.incorrect { background-color: #ef4444 !important; color: white !important; }
        .answered { pointer-events: none; }
        .q-tag { color: #ffffff !important; font-weight: 900; font-size: 0.85rem; margin-bottom: 0.4rem; display: block; }
        #loadingOverlay { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.95); z-index: 100; display: none; align-items: center; justify-content: center; }
    </style>
</head>

        const CACHE_KEY = "global_gs_complete_hierarchy_v1";
        const CACHE_TIME = 3600000; 
        let questions = [], activeChapter = null, currentSubKey = null, score = 0, wrong = 0, attempted = 0, timerId, startTime;

        document.addEventListener('DOMContentLoaded', () => { resetToHome(); preFetchAllData(); });

        async function preFetchAllData() {
            const cache = JSON.parse(localStorage.getItem(CACHE_KEY)) || {};
            const now = Date.now();
            let updated = false;
            for (const sub in quizChapters) {
                for (const ch of quizChapters[sub]) {
                    if (ch.url && (!cache[ch.id] || (now - cache[ch.id].timestamp > CACHE_TIME))) {
                        try {
                            const res = await fetch(ch.url);
                            if (res.ok) {
                                const text = await res.text();
                                cache[ch.id] = { data: parseCSV(text), timestamp: now };
                                updated = true;
                            }
                        } catch (e) {}
                    }
                }
            }
            if (updated) { localStorage.setItem(CACHE_KEY, JSON.stringify(cache)); if(currentSubKey) showSubChapters(currentSubKey); }
        }

        function renderCategories() {
            document.getElementById('folderBackBtn').classList.add('hidden');

                    <i data-lucide="${cat.icon}" class="text-primary w-10 h-10 mb-2"></i>
                    <h2 class="text-[12px] font-bold text-white uppercase tracking-widest">${cat.name}</h2>
                </div>`).join('');
            lucide.createIcons();
        }

        function showSubChapters(catId) {
            const cat = categories.find(c => c.id === catId);
            document.getElementById('folderBackBtn').classList.remove('hidden');
            const container = document.getElementById('mainSection');
            const cache = JSON.parse(localStorage.getItem(CACHE_KEY)) || {};
            
            container.innerHTML = cat.sub.flatMap(subKey => (quizChapters[subKey] || []).map(ch => {
                const s = JSON.parse(localStorage.getItem(ch.id + '_stats')) || { correct: 0, attempted: 0 };
                const actualTotal = cache[ch.id] ? cache[ch.id].data.length : "?"; 
                const acc = s.attempted > 0 ? Math.round((s.correct / s.attempted) * 100) : 0;
                return `
                <div class="nav-card shadow-2xl" onclick="initiateChapter('${subKey}', '${ch.id}')">
                    <h3 class="text-[9px] font-black uppercase opacity-40 mb-1 text-white">${ch.name}</h3>
                    <h2 class="text-[10px] font-bold text-white mb-2 truncate w-full px-1">${ch.title}</h2>
                    <div class="flex flex-col items-center mb-2 space-y-0.5">
                        <p class="text-[9px] font-bold text-slate-400">Prog: <span class="text-primary">${s.correct}/${actualTotal}</span></p>
                        <p class="text-[9px] font-bold text-slate-400">Acc: <span class="text-warning">${acc}%</span></p>
                    </div>
                    <div class="w-full bg-slate-700 h-1 rounded-full overflow-hidden">
                        <div class="bg-primary h-full" style="width: ${actualTotal !== "?" ? (s.correct/actualTotal)*100 : 0}%"></div>
                    </div>
                </div>`;
            })).join('');
            currentSubKey = catId;
        }

        async function initiateChapter(subKey, chId) {
            const chapter = quizChapters[subKey].find(c => c.id === chId);
            if (!chapter.url) return alert("Content coming soon!");
            const cache = JSON.parse(localStorage.getItem(CACHE_KEY)) || {};
            if (cache[chId]) { questions = cache[chId].data; activeChapter = chapter; startQuiz(); }
            else { alert("Downloading data..."); }
        }

        function parseCSV(text) {
            return text.split('\n').filter(l => l.trim() !== "").slice(1).map(row => {
                const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                return { q: cols[1]?.replace(/"/g, '').trim(), opts: [cols[2], cols[3], cols[4], cols[5]].map(o => o?.replace(/"/g, '').trim()), ans: cols[6]?.trim() };
            });
        }

        function startQuiz() {
            score = 0; wrong = 0; attempted = 0;
            showView('quiz');
            document.getElementById('questionsContainer').innerHTML = questions.map((q, i) => `
                <div id="q-${i}" class="bg-slate-800/60 border border-white/5 p-6 rounded-3xl shadow-xl">
                    <span class="q-tag">Q${i+1}</span>
                    <p class="text-white font-medium mb-5 leading-relaxed text-sm">${q.q}</p>
                    <div class="grid gap-2">${q.opts.map((opt, oi) => `<button class="btn btn-ghost justify-start h-auto py-4 px-4 text-left border border-white/5 text-xs option-btn" onclick="handleTap(${i}, this, '${oi+1}')">${opt}</button>`).join('')}</div>
                </div>`).join('');
            startTime = Date.now();
            timerId = setInterval(() => { const d = Math.floor((Date.now()-startTime)/1000); document.getElementById('timerDisplay').innerText = `${Math.floor(d/60).toString().padStart(2,'0')}:${(d%60).toString().padStart(2,'0')}`; }, 1000);
        }

        function handleTap(idx, btn, choice) {
            const card = document.getElementById(`q-${idx}`);
            if (card.classList.contains('answered')) return;
            card.classList.add('answered');
            const q = questions[idx]; attempted++;
            if (choice === q.ans) { btn.classList.add('correct'); score++; }
            else { btn.classList.add('incorrect'); wrong++; const b = card.querySelectorAll('.option-btn'); if (b[q.ans-1]) b[q.ans-1].classList.add('correct'); }
            document.getElementById('qsAttempted').innerText = attempted;
            document.getElementById('qsCorrect').innerText = score;
            document.getElementById('qsIncorrect').innerText = wrong;
            document.getElementById('qsAccuracy').innerText = attempted > 0 ? Math.round((score/attempted)*100) + "%" : "0%";
            setTimeout(() => { const next = card.nextElementSibling; if(next) next.scrollIntoView({ behavior: 'smooth', block: 'center' }); }, 800);
        }

        function finishQuiz() {
            localStorage.setItem(activeChapter.id + '_stats', JSON.stringify({ correct: score, attempted: attempted }));
            const h = JSON.parse(localStorage.getItem("_historical_sessions")) || [];
            h.push({ name: activeChapter.title, correct: score, attempted: attempted });
            localStorage.setItem("_historical_sessions", JSON.stringify(h));
            exitQuizMode();
        }

        function exitQuizMode() { clearInterval(timerId); showView('main'); if (currentSubKey) showSubChapters(currentSubKey); else renderCategories(); }
        function resetToHome() { currentSubKey = null; showView('main'); renderCategories(); }
        function goBack() { if(currentSubKey) resetToHome(); }

        function showView(v) { 
            document.querySelectorAll('.view').forEach(e => e.classList.add('hidden')); 
            document.getElementById(v + 'Section').classList.remove('hidden'); 
            document.getElementById('navbar').style.display = (v === 'quiz') ? 'none' : 'flex'; 
            document.getElementById('bottomNavBar').classList.toggle('hidden', v !== 'quiz');
            if(v === 'insights') updateInsights();
            setTimeout(() => lucide.createIcons(), 50);
        }

        function updateInsights() {
            const s = JSON.parse(localStorage.getItem("_historical_sessions")) || [];
            let totalC = 0, totalA = 0;
            s.forEach(h => { totalC += h.correct; totalA += h.attempted; });
            const acc = totalA > 0 ? Math.round((totalC / totalA) * 100) : 0;
            document.getElementById('dashboardRadial').style.setProperty('--value', acc);
            document.getElementById('radialPercent').innerText = acc + "%";
            document.getElementById('statCorrect').innerText = totalC;
            document.getElementById('statIncorrect').innerText = totalA - totalC;
            document.getElementById('statAttempted').innerText = totalA;
        }

        function openMixModal() {
            const list = document.getElementById('mixCategoryList');
            list.innerHTML = categories.map(cat => `<div class="bg-slate-900 p-4 rounded-xl mb-4"><h4 class="font-bold text-sm mb-2 opacity-60 uppercase">${cat.name}</h4>${cat.sub.flatMap(s => (quizChapters[s] || []).map(ch => `<div class="flex items-center gap-3 py-1"><input type="checkbox" value="${ch.id}" class="checkbox checkbox-primary checkbox-sm mix-ch-check"><span class="text-xs">${ch.title}</span></div>`)).join('')}</div>`).join('');
            document.getElementById('mixQuizModal').showModal();
        }

        function generateMixQuiz() {
            const selected = Array.from(document.querySelectorAll('.mix-ch-check:checked'));
            if(selected.length === 0) return alert("Select at least one!");
            document.getElementById('mixQuizModal').close();
            let mixed = []; const cache = JSON.parse(localStorage.getItem(CACHE_KEY));
            for(const el of selected) { if (cache[el.value]) mixed.push(...cache[el.value].data); }
            questions = mixed.sort(() => 0.5 - Math.random()).slice(0, 100);
            activeChapter = { id: "mix", title: "Mixed Session", total: questions.length };
            startQuiz();
        }
    </script>
</body>
</html>
