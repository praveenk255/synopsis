<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8" />
    <title>Ancient History Quiz Pro</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.4.19/dist/full.min.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/lucide/dist/umd/lucide.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap');
        body { font-family: 'Poppins', sans-serif; background-color: #0f172a; color: #f1f5f9; scroll-behavior: smooth; }
        
        /* Floating Quiz Pills */
        .top-stats-container { position: fixed; top: 12px; left: 0; width: 100%; display: flex; justify-content: space-evenly; align-items: center; padding: 0 4px; z-index: 50; pointer-events: none; }
        .glass-pill { background: rgba(30, 41, 59, 0.8) !important; backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 12px; display: flex; flex-direction: column; align-items: center; justify-content: center; width: 82px; height: 46px; box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4); pointer-events: auto; }
        .stat-label { font-size: 0.5rem; font-weight: 800; text-transform: uppercase; opacity: 0.6; line-height: 1; margin-bottom: 2px; }
        .stat-val { font-size: 0.85rem; font-weight: 900; line-height: 1; }
        .timer-pill { width: 105px !important; flex-direction: row !important; gap: 8px; }

        /* Home Cards: 150x150px Square */
        .quiz-card { width: 150px; height: 150px; background-color: #1e293b; border: 1px solid rgba(255, 255, 255, 0.05); display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; border-radius: 1.5rem; padding: 0.8rem; transition: transform 0.1s ease; }
        .quiz-card:active { transform: scale(0.96); }

        /* Dashboard Metric Cards - Centered Content */
        .metric-card { 
            background-color: #1e293b; 
            padding: 1.25rem 0.5rem; 
            border-radius: 1rem; 
            border: 1px solid rgba(255, 255, 255, 0.05); 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            text-align: center;
            gap: 0.25rem; 
        }

        /* Quiz Logic UI */
        .option-btn.correct { background-color: #22c55e !important; color: white !important; border: none !important; }
        .option-btn.incorrect { background-color: #ef4444 !important; color: white !important; border: none !important; }
        .answered { pointer-events: none; }
        .q-tag { color: #ffffff !important; font-weight: 900; font-size: 0.9rem; margin-bottom: 0.4rem; display: block; }
        
        #loadingOverlay { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.95); z-index: 100; display: none; align-items: center; justify-content: center; }
    </style>
</head>
<body class="min-h-screen flex flex-col overflow-x-hidden">

    <div id="loadingOverlay"><span class="loading loading-spinner loading-lg text-primary"></span></div>

    <div id="navbar" class="navbar bg-slate-900 border-b border-white/5 sticky top-0 z-50">
        <div class="flex-1">
            <button class="btn btn-ghost text-lg font-bold px-4" onclick="showView('main')"><i data-lucide="layers" class="text-primary w-5"></i> Quiz Pro</button>
        </div>
        <div class="flex-none gap-2 px-2">
            <button class="btn btn-sm btn-ghost rounded-full" onclick="document.getElementById('mixQuizModal').showModal()"><i data-lucide="shuffle" class="w-4"></i> Mix</button>
            <button class="btn btn-sm btn-primary rounded-full px-5" onclick="showView('insights')"><i data-lucide="bar-chart-3" class="w-4"></i> Insights</button>
        </div>
    </div>

    <div id="mainSection" class="view p-4 grid grid-cols-2 gap-4 max-w-4xl mx-auto w-full pt-6 content-start items-start justify-items-center">
        </div>

    <div id="insightsSection" class="view hidden p-4 space-y-6 flex-grow w-full max-w-4xl mx-auto pb-24">
        <h2 class="text-xl font-bold flex items-center gap-2 px-2"><i data-lucide="activity" class="text-primary"></i> Dashboard</h2>
        
        <div class="bg-slate-800/50 p-6 rounded-3xl border border-white/5 flex flex-col md:flex-row items-center gap-8 shadow-2xl">
            <div class="flex flex-col items-center gap-2">
                <div class="radial-progress text-slate-700" id="dashboardRadial" style="--value:0; --size:10rem; --thickness: 10px;">
                    <span class="text-3xl font-black text-white" id="radialPercent">0%</span>
                </div>
                <span class="text-xs font-bold opacity-50 uppercase tracking-widest">Overall Accuracy</span>
            </div>

            <div class="grid grid-cols-2 gap-4 w-full">
                <div class="metric-card">
                    <div class="flex items-center gap-1.5 text-[10px] font-bold uppercase opacity-60"><i data-lucide="check-circle" class="w-3 text-success"></i> Correct</div>
                    <div class="text-2xl font-black text-success" id="statCorrect">0</div>
                </div>
                <div class="metric-card">
                    <div class="flex items-center gap-1.5 text-[10px] font-bold uppercase opacity-60"><i data-lucide="x-circle" class="w-3 text-error"></i> Incorrect</div>
                    <div class="text-2xl font-black text-error" id="statIncorrect">0</div>
                </div>
                <div class="metric-card">
                    <div class="flex items-center gap-1.5 text-[10px] font-bold uppercase opacity-60"><i data-lucide="trophy" class="w-3 text-warning"></i> Completed</div>
                    <div class="text-2xl font-black text-warning" id="statCompleted">0</div>
                </div>
                <div class="metric-card">
                    <div class="flex items-center gap-1.5 text-[10px] font-bold uppercase opacity-60"><i data-lucide="list-checks" class="w-3 text-primary"></i> Attempted</div>
                    <div class="text-2xl font-black text-primary" id="statAttempted">0</div>
                </div>
            </div>
        </div>

        <div class="bg-slate-800/50 p-5 rounded-3xl border border-white/5 space-y-4">
            <h2 class="font-bold text-red-400 flex items-center gap-2 text-xs uppercase tracking-tighter"><i data-lucide="alert-triangle" class="w-4"></i> Review Mistakes</h2>
            <select id="mistakesSelector" class="select select-sm select-bordered w-full bg-slate-900 text-xs" onchange="renderMistakes(this.value)">
                <option value="">-- Select Quiz --</option>
            </select>
            <div id="mistakesContainer" class="space-y-3"></div>
        </div>

        <button class="btn btn-primary w-full rounded-xl" onclick="showView('main')">Start a new quiz</button>
    </div>

    <div id="quizSection" class="view hidden flex-grow flex flex-col items-center">
        <div class="top-stats-container">
            <div class="glass-pill"><span class="stat-label">Prog</span><span id="qsAttempted" class="stat-val text-primary">0</span></div>
            <div class="glass-pill"><span class="stat-label text-success">Correct</span><span id="qsCorrect" class="stat-val text-success">0</span></div>
            <div class="glass-pill"><span class="stat-label text-error">Incorrect</span><span id="qsIncorrect" class="stat-val text-error">0</span></div>
            <div class="glass-pill"><span class="stat-label text-warning">Acc</span><span id="qsAccuracy" class="stat-val text-warning">0%</span></div>
        </div>
        <div id="questionsContainer" class="p-4 space-y-6 w-full max-w-2xl mt-16 pb-40"></div>
    </div>

    <div id="bottomNavBar" class="hidden fixed bottom-6 left-0 w-full flex justify-between items-center px-6 z-50 pointer-events-none">
        <div class="glass-pill timer-pill text-primary font-mono text-lg font-black pointer-events-auto">
            <i data-lucide="clock" class="w-5 h-5"></i><span id="timerDisplay">00:00</span>
        </div>
        <div class="flex gap-2 pointer-events-auto">
            <button class="btn btn-circle glass-pill h-11 border-none text-white" onclick="showView('main')"><i data-lucide="x" class="w-6"></i></button>
            <button class="btn glass-pill h-11 border-none px-6 text-primary font-bold uppercase tracking-widest" onclick="finishQuiz()">Finish</button>
        </div>
    </div>

    <dialog id="mixQuizModal" class="modal">
        <div class="modal-box bg-slate-800">
            <h3 class="font-bold text-lg mb-4 text-center">Mix Questions</h3>
            <div id="mixList" class="space-y-2 max-h-60 overflow-y-auto p-2 bg-slate-900 rounded-lg">
                <div class="flex items-center gap-2"><input type="checkbox" checked class="checkbox checkbox-primary"> Chapter 1</div>
            </div>
            <div class="modal-action justify-center gap-4">
                <button class="btn btn-primary px-8" onclick="startMixQuiz()">Start Mix (100 Qs)</button>
                <form method="dialog"><button class="btn btn-ghost">Cancel</button></form>
            </div>
        </div>
    </dialog>

    <script>
        const sheetLink = "https://docs.google.com/spreadsheets/d/e/2PACX-1vShhhxNFMbdnZ1-n3P8BXhg1I7KoHhpEdcmdrJMTBdlW6zEINc4WBaXvyYQY2Fi4fyJ-H-7CG5o51Tk/pub?output=csv";
        const CACHE_KEY = "history_pro_final_v10";
        const CACHE_TIME = 3600000;

        let quizQuestions = [], curQuiz = "Chapter 1", score = 0, wrong = 0, attemptedCount = 0, timerId, startTime;
        const fullChapterName = "Historical Sources and Pre-Historic Period";

        document.addEventListener('DOMContentLoaded', async () => {
            await initData();
            renderHome();
            lucide.createIcons();
        });

        async function initData() {
            const cache = JSON.parse(localStorage.getItem(CACHE_KEY)) || {};
            if (cache[curQuiz] && (Date.now() - cache[curQuiz].timestamp < CACHE_TIME)) {
                quizQuestions = cache[curQuiz].data;
                return;
            }
            document.getElementById('loadingOverlay').style.display = 'flex';
            try {
                const res = await fetch(sheetLink);
                const text = await res.text();
                quizQuestions = parseCSV(text);
                cache[curQuiz] = { data: quizQuestions, timestamp: Date.now() };
                localStorage.setItem(CACHE_KEY, JSON.stringify(cache));
            } catch (e) { console.error("Fetch Fail"); }
            document.getElementById('loadingOverlay').style.display = 'none';
        }

        function parseCSV(text) {
            return text.split('\n').filter(l => l.trim() !== "").slice(1).map(row => {
                const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                return { q: cols[1]?.replace(/"/g, '').trim(), opts: [cols[2], cols[3], cols[4], cols[5]].map(o => o?.replace(/"/g, '').trim()), ans: cols[6]?.trim() };
            });
        }

        function renderHome() {
            const s = JSON.parse(localStorage.getItem(curQuiz + '_stats')) || { correct: 0, attempted: 0 };
            const total = quizQuestions.length || 115;
            const acc = s.attempted > 0 ? Math.round((s.correct / s.attempted) * 100) : 0;
            document.getElementById('mainSection').innerHTML = `
                <div class="quiz-card shadow-2xl cursor-pointer" onclick="startQuiz()">
                    <h3 class="text-[9px] font-black uppercase opacity-40 mb-1 text-white">Chapter 1</h3>
                    <h2 class="text-[10px] font-bold text-white mb-2 truncate w-full px-1">${fullChapterName}</h2>
                    <div class="flex flex-col items-center mb-3 space-y-0.5">
                        <p class="text-[10px] font-bold text-slate-400">Progress: <span class="text-primary">${s.correct}/${total}</span></p>
                        <p class="text-[10px] font-bold text-slate-400">Accuracy: <span class="text-warning">${acc}%</span></p>
                    </div>
                    <div class="w-full bg-slate-700 h-1 rounded-full overflow-hidden">
                        <div class="bg-primary h-full transition-all" style="width: ${(s.correct/total)*100}%"></div>
                    </div>
                </div>`;
        }

        function showView(viewId) {
            clearInterval(timerId);
            document.querySelectorAll('.view').forEach(v => v.classList.add('hidden'));
            document.getElementById(viewId + 'Section').classList.remove('hidden');
            document.getElementById('navbar').style.display = (viewId === 'quiz') ? 'none' : 'flex';
            document.getElementById('bottomNavBar').classList.toggle('hidden', viewId !== 'quiz');
            if(viewId === 'main') renderHome();
            if(viewId === 'insights') updateInsights();
            setTimeout(() => lucide.createIcons(), 50);
        }

        function startQuiz() {
            score = 0; wrong = 0; attemptedCount = 0;
            showView('quiz');
            renderQuestions();
            startTimer();
            window.scrollTo(0,0);
        }

        function renderQuestions() {
            const container = document.getElementById('questionsContainer');
            container.innerHTML = quizQuestions.map((q, i) => `
                <div id="q-${i}" class="bg-slate-800/60 border border-white/5 p-6 rounded-3xl backdrop-blur-md shadow-xl">
                    <span class="q-tag">Q${i+1}</span>
                    <p class="text-white font-medium mb-5 leading-relaxed text-sm">${q.q}</p>
                    <div class="grid gap-2">
                        ${q.opts.map((opt, oi) => `
                            <button class="btn btn-ghost justify-start h-auto py-4 px-4 text-left font-normal normal-case border border-white/5 text-xs option-btn" 
                                    onclick="handleTap(${i}, this, '${oi+1}')">${opt}</button>
                        `).join('')}
                    </div>
                </div>
            `).join('');
        }

        function handleTap(idx, btn, choice) {
            const card = document.getElementById(`q-${idx}`);
            if (card.classList.contains('answered')) return;
            card.classList.add('answered');
            const q = quizQuestions[idx];
            attemptedCount++;
            if (choice === q.ans) { btn.classList.add('correct'); score++; }
            else { 
                btn.classList.add('incorrect'); wrong++;
                const btns = card.querySelectorAll('.option-btn');
                if (btns[q.ans-1]) btns[q.ans-1].classList.add('correct');
                saveMistake(q, choice);
            }
            updateLiveStats();
            setTimeout(() => { const next = card.nextElementSibling; if(next) next.scrollIntoView({ behavior: 'smooth', block: 'center' }); }, 800);
        }

        function updateLiveStats() {
            document.getElementById('qsAttempted').innerText = attemptedCount;
            document.getElementById('qsCorrect').innerText = score;
            document.getElementById('qsIncorrect').innerText = wrong;
            const acc = attemptedCount > 0 ? Math.round((score/attemptedCount)*100) : 0;
            document.getElementById('qsAccuracy').innerText = acc + "%";
        }

        function startTimer() {
            startTime = Date.now();
            timerId = setInterval(() => {
                const d = Math.floor((Date.now()-startTime)/1000);
                document.getElementById('timerDisplay').innerText = `${Math.floor(d/60).toString().padStart(2,'0')}:${(d%60).toString().padStart(2,'0')}`;
            }, 1000);
        }

        function finishQuiz() {
            saveHistoricalSession();
            localStorage.setItem(curQuiz + '_stats', JSON.stringify({ correct: score, attempted: attemptedCount, total: quizQuestions.length }));
            showView('main');
        }

        function saveHistoricalSession() {
            const history = JSON.parse(localStorage.getItem("_historical_sessions")) || [];
            history.push({ quizName: curQuiz, correct: score, attempted: attemptedCount, total: quizQuestions.length });
            localStorage.setItem("_historical_sessions", JSON.stringify(history));
        }

        function saveMistake(q, choice) {
            const list = JSON.parse(localStorage.getItem("_all_mistakes")) || [];
            list.push({...q, user: choice, quizName: curQuiz});
            localStorage.setItem("_all_mistakes", JSON.stringify(list));
        }

        function updateInsights() {
            const sessions = JSON.parse(localStorage.getItem("_historical_sessions")) || [];
            const mistakes = JSON.parse(localStorage.getItem("_all_mistakes")) || [];
            
            let totalC = 0, totalA = 0, completed = 0;
            sessions.forEach(s => { totalC += s.correct; totalA += s.attempted; if(s.attempted === s.total) completed++; });
            const acc = totalA > 0 ? Math.round((totalC / totalA) * 100) : 0;
            
            document.getElementById('dashboardRadial').style.setProperty('--value', acc);
            document.getElementById('radialPercent').innerText = acc + "%";
            document.getElementById('statCorrect').innerText = totalC;
            document.getElementById('statIncorrect').innerText = mistakes.length;
            document.getElementById('statCompleted').innerText = completed;
            document.getElementById('statAttempted').innerText = totalA;

            const selector = document.getElementById('mistakesSelector');
            selector.innerHTML = '<option value="">-- Select Quiz --</option>';
            [...new Set(mistakes.map(m => m.quizName))].forEach(n => selector.innerHTML += `<option value="${n}">${n}</option>`);
        }

        function renderMistakes(quizName) {
            const list = JSON.parse(localStorage.getItem("_all_mistakes")) || [];
            document.getElementById('mistakesContainer').innerHTML = list.filter(m => m.quizName === quizName).map(m => `
                <div class="bg-slate-900/80 p-4 rounded-2xl text-[10px] border border-white/5">
                    <p class="font-bold text-white mb-2 leading-tight">${m.q}</p>
                    <p class="text-error mb-1">Your Answer: ${m.opts[m.user-1]}</p>
                    <p class="text-success font-bold">Correct Answer: ${m.opts[m.ans-1]}</p>
                </div>`).join('') || '<p class="text-center opacity-30 py-4 text-xs">No mistakes to display.</p>';
        }

        function startMixQuiz() {
            curQuiz = "Mixed Quiz";
            quizQuestions = quizQuestions.sort(() => 0.5 - Math.random()).slice(0, 100);
            document.getElementById('mixQuizModal').close();
            startQuiz();
        }
    </script>
</body>
</html>
